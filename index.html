<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>khimNguyen Sneaker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-text">khimNguyen Sneaker</div>
            <nav class="nav-bar">
                <a href="#">Jordan</a>
                <a href="#">Adidas</a>
                <a href="#">Puma</a>
                <a href="#">Vans</a>
            </nav>
            <img src="6.png" class="logo-img" alt="Logo">
        </header>

        <section class="category">
            <div class="category-title">Mẫu giày Jordan</div>
            <div class="product-banner">
                <img src="1.png" alt="Jordan Shoes">
            </div>
        </section>

        <section class="category">
            <div class="category-title">Mẫu giày Adidas</div>
            <div class="product-banner">
                <img src="2.png" alt="Adidas Shoes">
            </div>
        </section>

        <section class="category">
            <div class="category-title">Mẫu giày Puma</div>
            <div class="product-banner">
                <img src="3.png" alt="Puma Shoes">
            </div>
        </section>

        <section class="category">
            <div class="category-title">Mẫu giày Vans</div>
            <div class="product-banner">
                <img src="5.png" alt="Vans Shoes">
            </div>
        </section>

        <section class="best-sellers">
            <div class="section-label">Hàng Bán Chạy</div>
            <img src="4.png" class="featured-img" alt="Best Sellers">
        </section>

        <footer class="footer">
            <div class="footer-content">
                <h2 class="footer-heading">Thông Tin Liên Hệ</h2>
                
                <div class="contact-grid">
                    <div class="contact-item">
                        <img src="9.png" alt="Phone Icon">
                        <div class="contact-text">
                            <span class="label">Hotline</span>
                            <span class="value">0353883389</span>
                        </div>
                    </div>

                    <div class="contact-item">
                        <img src="8.png" alt="User Icon">
                        <div class="contact-text">
                            <span class="value">Nguyễn Khiêm</span>
                        </div>
                    </div>

                    <div class="contact-item">
                        <img src="7.png" alt="Social Icon">
                        <div class="contact-text">
                            <span class="value">KhimNguyen</span>
                        </div>
                    </div>
                </div>

                <p class="slogan">Đi xa hơn, bền hơn và phong cách hơn với đôi giày được tạo ra cho cuộc sống năng động.</p>
            </div>
        </footer>
    </div>
</body>
</html>
